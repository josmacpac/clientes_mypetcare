<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Veterinaria - PetCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white d-lg-none shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">🐾 MyPetCare</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasSidebar">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasSidebar" style="width: 280px;">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold">🐾 MyPetCare</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="nav flex-column">
                <li class="nav-item"><a href="index.html" class="nav-link py-3 text-dark"><i class="fas fa-calendar-day me-2"></i> Citas de Hoy</a></li>
                <li class="nav-item"><a href="#" class="nav-link py-3 text-dark"><i class="fas fa-paw me-2"></i> Pacientes</a></li>
                <li class="nav-item"><a href="inventarios.html" class="nav-link py-3 active fw-bold text-primary"><i class="fas fa-stethoscope me-2"></i> Inventario</a></li>
                <li class="nav-item"><a href="#" class="nav-link py-3 text-dark"><i class="fas fa-chart-bar me-2"></i> Reportes</a></li>
            </ul>
        </div>
    </div>

    <div class="d-flex">
        
        <nav class="sidebar d-none d-lg-block">
            <div class="p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">🐾 MyPetCare</h3>
                    <small class="opacity-75">Panel de Gestión</small>
                </div>
                <hr>
                <ul class="nav flex-column mt-4">
                    <li class="nav-item"><a href="index.html"  class="nav-link active">📅 Citas de Hoy</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">🐾 Pacientes</a></li>
                    <li class="nav-item"><a href="inventarios.html"  class="nav-link">🩺 Inventario</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">📊 Reportes</a></li>
                </ul>
                <div class="mt-3 pt-3 text-center">
                    <button class="btn btn-sidebar w-100 rounded-pill py-3">+ Nueva Consulta</button>
                </div>
                <div class="mt-3 pt-3 text-center">
                    <button class="btn btn-sidebar w-100 rounded-pill py-3">+ Nueva Venta</button>
                </div>
            </div>
        </nav>

        <main class="main-content p-3 p-md-5">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <h2 class="fw-bold">Gestión de <span style="color: var(--pearl-agua);">Citas</span></h2>
                <div class="bg-white p-2 px-4 rounded-pill shadow-sm d-flex align-items-center gap-3">
                    <span class="small fw-bold">Jose M</span>
                    <img src="https://i.pravatar.cc/45" class="rounded-circle" alt="doc">
                </div>
            </div>

            <div class="d-flex flex-wrap gap-3 mb-4">
                <button class="btn btn-primary rounded-pill px-4 py-2 shadow-sm" data-bs-toggle="modal" data-bs-target="#">
                    <i class="fas fa-plus-circle me-2"></i> Nueva cita
                </button>
                <button class="btn btn-success rounded-pill px-4 py-2 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalEntrada">
                    <i class="fas fa-truck-loading me-2"></i> Boton
                </button>
                <button class="btn btn-warning text-white rounded-pill px-4 py-2 shadow-sm"  data-bs-toggle="modal" data-bs-target="#modalReporteCaducidad">
                    <i class="fas fa-calendar-times me-2"></i> Boton
                </button>
            </div>



        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
